# Casbin model — RBAC-with-domains + ABAC conditions + deny-override.
# AUTHORED per the casbin-policy-engineer skill conventions (abac.conf variant).
#
# COORDINATION POINT — request_definition (the enforce() argument order):
#
#     enforce(sub, dom, obj, act)
#       sub: object with .id (actor user id) and .roles (sequence of role codes)
#       dom: the ACTOR's tenant id (the session's active tenant)
#       obj: object with .type, .owner_id, .assigned (sequence), .tenant
#            (resource's tenant id, or '' when the resource is not tenant-bound)
#       act: action code from app.authorization.permission_actions
#
# app/authorization/authorization_service.py maps ResourceContext to this
# shape; change them TOGETHER or decisions silently flip (major version bump
# per the rbac-library convention).
#
# Variant notes vs the rbac library's abac.conf:
# - Roles ride on r.sub.roles (resolved from the DB at session time) instead
#   of g-rules, because the identity.casbin_rule projection /
#   sp_rebuild_casbin_policy belong to the future identity/RBAC milestone.
#   When that ships, user->role g rows can replace r.sub.roles matching.
# - Objects are service-layer TYPE tokens (booking, event, ...), not URL
#   paths, so exact/wildcard match replaces keyMatch.
# - eft column + deny-override effect express rule 5 (refund requires finance).
# - The matcher itself enforces tenant equality (r.obj.tenant == r.dom) as a
#   backstop; AuthorizationService pre-checks it too and surfaces 404.

[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = role, obj_type, act, cond, eft

[policy_effect]
e = some(where (p.eft == allow)) && !some(where (p.eft == deny))

[matchers]
m = (p.role == '*' || p.role in r.sub.roles) && (p.obj_type == '*' || p.obj_type == r.obj.type) && (p.act == '*' || p.act == r.act) && (r.obj.tenant == '' || r.obj.tenant == r.dom) && (p.cond == '' || eval(p.cond))
